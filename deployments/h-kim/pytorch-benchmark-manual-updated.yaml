  labels:
    app: pytorch-bench-manual
  name: pytorch-bench-manual
  namespace: b-efficient-memory-offloading-765cab
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: Parallel
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: pytorch-bench-manual
  serviceName: pytorch-bench-manual-svc
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: default/eno5np0-network,default/eno6np0-network,default/eno7np0-network,default/eno8np0-network
      labels:
        app: pytorch-bench-manual
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-H100-80GB-HBM3
              - key: kubernetes.io/hostname
                operator: In
                values:
                - moc-r4pcc04u09-nairr
                - moc-r4pcc04u11-nairr
                - moc-r4pcc04u12-nairr
                - moc-r4pcc04u16-nairr
                - moc-r4pcc04u25-nairr
                - moc-r4pcc04u36-nairr
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - pytorch-bench-manual
            topologyKey: kubernetes.io/hostname
      containers:
      - args:
        - |
          set -e

          # Calculate environment variables
          export NODE_RANK=${HOSTNAME##*-}
          export MASTER_ADDR="pytorch-bench-manual-0.pytorch-bench-manual-svc"
          export MASTER_PORT=29501
          export NPROC_PER_NODE=4

          echo "=========================================="
          echo "PyTorch Benchmark Environment (Manual)"
          echo "=========================================="
          echo "Pod: ${POD_NAME}"
          echo "Node Rank: ${NODE_RANK}"
          echo "Master: ${MASTER_ADDR}:${MASTER_PORT}"
          echo "GPUs per node: ${NPROC_PER_NODE}"
          echo ""

          echo "=== GPU Information ==="
          nvidia-smi --query-gpu=index,name,memory.total --format=csv
          echo ""

          echo "=== RDMA Devices ==="
          ls -la /dev/infiniband/ 2>/dev/null || echo "No InfiniBand devices"
          echo ""

          echo "=== SR-IOV Network Interfaces ==="
          for iface in net1 net2 net3 net4; do
            if [ -e /sys/class/net/$iface ]; then
              echo "$iface: $(cat /sys/class/net/$iface/address) MTU=$(cat /sys/class/net/$iface/mtu)"
            fi
          done
          echo ""

          echo "=== NCCL Configuration ==="
          env | grep NCCL | sort
          echo ""

          echo "=========================================="
          echo "Environment ready. Waiting for benchmark job..."
          echo ""
          echo "To run benchmark: exec into pod-0 and run torchrun"
          echo "To scale: oc scale statefulset pytorch-bench-manual -n nccl-test --replicas=N"
          echo "=========================================="

          sleep infinity
        command:
        - /bin/bash
        - -c
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: NCCL_DEBUG
          value: INFO
        - name: NCCL_DEBUG_SUBSYS
          value: INIT,NET
        - name: NCCL_DMABUF_ENABLE
          value: "1"
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        - name: NCCL_MAX_NCHANNELS
          value: "16"
        - name: NCCL_SOCKET_IFNAME
          value: net1,net2,net3,net4
        - name: NCCL_NET_GDR_LEVEL
          value: "5"
        - name: NCCL_NET_GDR_READ
          value: "1"
        - name: NCCL_IB_GID_INDEX
          value: "3"
        - name: NCCL_IB_TC
          value: "106"
        - name: NCCL_IB_TIMEOUT
          value: "23"
        - name: NCCL_IB_RETRY_CNT
          value: "7"
        - name: NCCL_IB_SL
          value: "0"
        - name: NCCL_IB_AR_THRESHOLD
          value: "8192"
        - name: NCCL_PROTO
          value: Simple
        - name: NCCL_ALGO
          value: Ring
        - name: NCCL_BUFFSIZE
          value: "8388608"
        - name: NCCL_NTHREADS
          value: "512"
        - name: NCCL_LL_THRESHOLD
          value: "0"
        - name: NCCL_TREE_THRESHOLD
          value: "0"
        - name: NCCL_SOCKET_FAMILY
          value: "4"
        - name: NCCL_NSOCKS_PERTHREAD
          value: "8"
        - name: NCCL_CROSS_NIC
          value: "2"
        - name: NCCL_NVLS_ENABLE
          value: "0"
        - name: NCCL_NET_SHARED_BUFFERS
          value: "1"
        - name: NCCL_IB_PCI_RELAXED_ORDERING
          value: "1"
        - name: NCCL_NET_OVERHEAD
          value: "0"
        - name: NCCL_IGNORE_CPU_AFFINITY
          value: "1"
        - name: CUDA_VISIBLE_DEVICES
          value: 0,1,2,3
        image: quay.io/jschless/ml-dev-env:h-kim
        imagePullPolicy: IfNotPresent
        name: pytorch-bench
        resources:
          limits:
            cpu: "64"
            memory: 1200Gi
            nvidia.com/gpu: "4"
            openshift.io/eno5np0rdma: "1"
            openshift.io/eno6np0rdma: "1"
            openshift.io/eno7np0rdma: "1"
            openshift.io/eno8np0rdma: "1"
          requests:
            cpu: "32"
            memory: 1200Gi
            nvidia.com/gpu: "4"
            openshift.io/eno5np0rdma: "1"
            openshift.io/eno6np0rdma: "1"
            openshift.io/eno7np0rdma: "1"
            openshift.io/eno8np0rdma: "1"
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
            - SYS_ADMIN
          privileged: false
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /benchmark
          name: benchmark-script
        - mountPath: /workspace
          name: workspace
        - mountPath: /host-sys
          name: host-sys
          readOnly: true
      dnsPolicy: ClusterFirst
      hostIPC: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: h-kim-sa
      serviceAccountName: h-kim-sa
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: pytorch-benchmark
        name: benchmark-script
      - hostPath:
          path: /sys
          type: ""
        name: host-sys
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: workspace
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 100Gi
      storageClassName: ocs-external-storagecluster-ceph-rbd
      volumeMode: Filesystem
    status:
      phase: Pending
