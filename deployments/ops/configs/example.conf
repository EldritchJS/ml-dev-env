# NCCL Deployment Configuration
#
# Copy this file into your deployment directory and edit:
#   mkdir deployments/<your-name>
#   cp deployments/ops/configs/example.conf deployments/<your-name>/config.conf
#   # Edit config.conf
#   ./deployments/ops/generate-nccl-manifest.sh -c deployments/<your-name>/config.conf -o deployments/<your-name>/manifest.yaml
#   ./deployments/ops/run-nccl-job.sh -c deployments/<your-name>/config.conf -m deployments/<your-name>/manifest.yaml

# =============================================================================
# REQUIRED — you must set these for your deployment
# =============================================================================

# Kubernetes namespace to deploy into
NAMESPACE="nccl-test"

# Name prefix for all resources (StatefulSet, Service, ConfigMap, labels)
DEPLOY_NAME="nccl-benchmark"

# Container image with PyTorch and NCCL
IMAGE="quay.io/jschless/ml-dev-env:latest"

# Service account (must have SCC allowing hostIPC, IPC_LOCK, SYS_ADMIN)
SERVICE_ACCOUNT="nccl-benchmark"

# GPU node hostnames (space-separated). Replica count is derived from this list.
NODES="node1 node2 node3"

# =============================================================================
# HARDWARE — defaults match Barcelona H100 cluster
# Change these if deploying on a different cluster or hardware config.
# =============================================================================

# Multus network attachment names (comma-separated)
NETWORK_ATTACHMENTS="eno5np0-network,eno6np0-network,eno7np0-network,eno8np0-network"

# SR-IOV RDMA resource names (space-separated, one per NIC)
RDMA_RESOURCES="openshift.io/eno5np0rdma openshift.io/eno6np0rdma openshift.io/eno7np0rdma openshift.io/eno8np0rdma"

# NCCL IB HCA device IDs (comma-separated, as seen inside SR-IOV pods)
MLX5_DEVICES="mlx5_6,mlx5_7,mlx5_8,mlx5_9"

# NCCL socket interface names (comma-separated)
SOCKET_IFNAMES="net1,net2,net3,net4"

# GPU product label for nodeAffinity
GPU_PRODUCT="NVIDIA-H100-80GB-HBM3"

# GPUs per node
GPU_COUNT=4

# CUDA visible devices (comma-separated)
CUDA_VISIBLE_DEVICES="0,1,2,3"

# Master port for torchrun
MASTER_PORT=29501

# Benchmark script to embed in ConfigMap (default: IBM AllReduce)
# Set to any Python script compatible with torchrun
# BENCHMARK_SCRIPT="/path/to/my-benchmark.py"

# =============================================================================
# RESOURCES — defaults match gold standard
# =============================================================================

# CPU_REQUEST="32"
# CPU_LIMIT="64"
# MEMORY="1200Gi"

# =============================================================================
# NCCL TUNING — gold standard defaults apply if unset
# Uncomment any line below to override the default value.
# =============================================================================

# NCCL_DMABUF_ENABLE="1"         # Required: no nvidia_peermem module
# NCCL_CROSS_NIC="0"             # Required: isolated subnets
# NCCL_DEBUG="INFO"
# NCCL_DEBUG_SUBSYS="INIT,NET"
# NCCL_MIN_NCHANNELS="8"
# NCCL_MAX_NCHANNELS="16"
# NCCL_NET_GDR_LEVEL="5"
# NCCL_NET_GDR_READ="1"
# NCCL_IB_GID_INDEX="3"
# NCCL_IB_TC="106"
# NCCL_IB_TIMEOUT="23"
# NCCL_IB_RETRY_CNT="7"
# NCCL_IB_SL="0"
# NCCL_IB_AR_THRESHOLD="8192"
# NCCL_IB_PCI_RELAXED_ORDERING="1"
# NCCL_PROTO="Simple"
# NCCL_ALGO="Ring"
# NCCL_BUFFSIZE="8388608"
# NCCL_NTHREADS="640"
# NCCL_LL_THRESHOLD="0"
# NCCL_TREE_THRESHOLD="0"
# NCCL_SOCKET_FAMILY="4"
# NCCL_NSOCKS_PERTHREAD="8"
# NCCL_NVLS_ENABLE="0"
# NCCL_NET_SHARED_BUFFERS="1"
# NCCL_NET_OVERHEAD="0"
# NCCL_IGNORE_CPU_AFFINITY="1"
