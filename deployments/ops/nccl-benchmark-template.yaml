---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nccl-benchmark-script
  namespace: NAMESPACE_PLACEHOLDER
data:
  allreduce-loop.py: |
    #
    # Copyright IBM Corp. 2024
    # SPDX-License-Identifier: MIT
    #

    import os
    import sys
    import torch
    import torch.distributed as dist
    import time
    import argparse

    parser = argparse.ArgumentParser()
    parser.add_argument("-m", "--multiplier", type=int, default=1)
    parser.add_argument("-r", "--runs", type=int, default=1, help="Number of times to run the entire benchmark")

    args = parser.parse_args()
    multiplier = args.multiplier
    num_runs = args.runs

    local_rank = int(os.environ["LOCAL_RANK"])
    rank = int(os.environ["RANK"])
    world_size = int(os.environ["WORLD_SIZE"])

    torch.cuda.set_device(local_rank)

    dist.init_process_group("nccl")

    if rank == 0:
        print("NCCL version : ", torch.cuda.nccl.version(), file=sys.stderr)

    torch.manual_seed(1235911);

    nMB = 10000.0
    npts = int(nMB*1.0e6/4.0)

    Tensor = torch.rand(npts, device='cuda')
    torch.cuda.synchronize()

    for run in range(num_runs):
        if rank == 0:
            if num_runs > 1:
                print(f"\n=== Run {run + 1} / {num_runs} ===", file=sys.stderr)
            print(" size(MB)   tavg(usec)    tmin(usec)    tmax(usec)  avgbw(GB/sec)  maxbw(GB/sec)  minbw(GB/sec)", file=sys.stderr)

        for nMB in [0.10,0.12,0.15,0.20,0.32,0.40,0.50,0.64,0.80,1.00,1.25,1.50,2.00,3.16,4.00,5.00,6.40,8.00,\
                    10.0,12.5,15.0,20.0,31.6,40.0,50.0,64.0,80.0,100.0,125.0,160.0,200.0,250.0,316.0,400.0,500.0,640.0,800.0,\
                    1000.0,1250.0,1600.0,2000.0,2500.0,3160.0,4000.0,5000.0,6400.0,8000.0]:

            if nMB < 10.0:
                maxiter = 100*multiplier
            elif nMB < 512.0:
                maxiter = 20*multiplier
            elif nMB < 2000.0:
                maxiter = 10*multiplier
            else:
                maxiter = 5*multiplier

            npts = int(nMB*1.0e6/4.0)
            nm1 = int(npts - 1)

            dist.all_reduce(Tensor[0:nm1], op=dist.ReduceOp.SUM)
            torch.cuda.synchronize()
            dist.all_reduce(Tensor[0:nm1], op=dist.ReduceOp.SUM)
            torch.cuda.synchronize()

            tbeg = time.perf_counter()
            t1 = tbeg
            tmin = 1.0e30
            tmax = 0.0

            for i in range(maxiter):
                dist.all_reduce(Tensor[0:nm1], op=dist.ReduceOp.SUM)
                torch.cuda.synchronize()
                t2 = time.perf_counter()
                if (t2 - t1) < tmin:
                    tmin = (t2 - t1)
                if (t2 - t1) > tmax:
                    tmax = (t2 - t1)
                t1 = t2

            torch.cuda.synchronize()
            tend = time.perf_counter()

            elapsed = tend - tbeg
            tavg = elapsed / maxiter

            avgbw = 4.0*2.0e-9*npts*((world_size - 1)/world_size)/tavg
            maxbw = 4.0*2.0e-9*npts*((world_size - 1)/world_size)/tmin
            minbw = 4.0*2.0e-9*npts*((world_size - 1)/world_size)/tmax

            if rank == 0:
                print("{:8.2f}".format(nMB), "  ", "{:7.1f}".format(tavg*1.0e6), "      ", "{:7.1f}".format(tmin*1.0e6), "      ", "{:7.1f}".format(tmax*1.0e6), \
                      "     ", "{:7.2f}".format(avgbw), "      ", "{:7.2f}".format(maxbw), "      ", "{:7.2f}".format(minbw), file=sys.stderr)

    dist.destroy_process_group()
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nccl-benchmark
  namespace: NAMESPACE_PLACEHOLDER
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nccl-benchmark-scc-binding
  namespace: NAMESPACE_PLACEHOLDER
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:nccl-scc
subjects:
- kind: ServiceAccount
  name: nccl-benchmark
  namespace: NAMESPACE_PLACEHOLDER
---
apiVersion: v1
kind: Service
metadata:
  name: nccl-benchmark-svc
  namespace: NAMESPACE_PLACEHOLDER
spec:
  clusterIP: None
  selector:
    app: nccl-benchmark
  ports:
  - port: 29501
    targetPort: 29501
    name: torchrun
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nccl-benchmark
  namespace: NAMESPACE_PLACEHOLDER
spec:
  serviceName: nccl-benchmark-svc
  replicas: 16
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: nccl-benchmark
  template:
    metadata:
      labels:
        app: nccl-benchmark
      annotations:
        k8s.v1.cni.cncf.io/networks: eno5np0-network,eno6np0-network,eno7np0-network,eno8np0-network
    spec:
      serviceAccountName: nccl-benchmark
      hostIPC: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: nccl-benchmark
            topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                # MODIFY THESE NODE NAMES - Replace with your target nodes
                - moc-r4pcc04u03-nairr
                - moc-r4pcc04u09-nairr
                - moc-r4pcc04u11-nairr
                - moc-r4pcc04u12-nairr
                - moc-r4pcc04u15-jason
                - moc-r4pcc04u16-nairr
                - moc-r4pcc04u25-nairr
                - moc-r4pcc04u37-nairr
                - moc-r4pcc02u05
                - moc-r4pcc02u10-nairr
                - moc-r4pcc02u18-nairr
                - moc-r4pcc02u25-nairr
                - moc-r4pcc02u30-nairr
                - moc-r4pcc02u32
                - moc-r4pcc02u35
                - moc-r4pcc02u16-yunshi
                #- moc-r4pcc04u09-nairr
                #- moc-r4pcc04u11-nairr
                #- moc-r4pcc04u12-nairr
                #- moc-r4pcc04u16-nairr
      containers:
      - name: nccl-test
        image: quay.io/jschless/ml-dev-env:latest
        command: ["sleep", "infinity"]
        resources:
          requests:
            nvidia.com/gpu: 4
            openshift.io/eno5np0rdma: 1
            openshift.io/eno6np0rdma: 1
            openshift.io/eno7np0rdma: 1
            openshift.io/eno8np0rdma: 1
          limits:
            nvidia.com/gpu: 4
            openshift.io/eno5np0rdma: 1
            openshift.io/eno6np0rdma: 1
            openshift.io/eno7np0rdma: 1
            openshift.io/eno8np0rdma: 1
        env:
        # Critical NCCL settings - DO NOT MODIFY unless you know what you're doing
        - name: NCCL_DMABUF_ENABLE
          value: "1"
        - name: NCCL_CROSS_NIC
          value: "0"
        - name: NCCL_IB_HCA
          value: "mlx5_6,mlx5_7,mlx5_8,mlx5_9"
        - name: NCCL_SOCKET_IFNAME
          value: "net1,net2,net3,net4"

        # Performance tuning
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        - name: NCCL_MAX_NCHANNELS
          value: "16"
        - name: NCCL_NET_GDR_LEVEL
          value: "5"
        - name: NCCL_NET_GDR_READ
          value: "1"
        - name: NCCL_PROTO
          value: "Simple"
        - name: NCCL_ALGO
          value: "Ring"

        # Debugging (optional - comment out for production)
        # - name: NCCL_DEBUG
        #   value: "INFO"
        # - name: NCCL_DEBUG_SUBSYS
        #   value: "INIT,NET"

        volumeMounts:
        - name: benchmark-script
          mountPath: /benchmark
        - name: host-sys
          mountPath: /host-sys
          readOnly: true
        - name: workspace
          mountPath: /workspace
        - name: shm
          mountPath: /dev/shm

        securityContext:
          privileged: false
          capabilities:
            add:
            - IPC_LOCK
            - SYS_ADMIN

      volumes:
      - name: benchmark-script
        configMap:
          name: nccl-benchmark-script
      - name: host-sys
        hostPath:
          path: /sys
          type: Directory
      - name: workspace
        emptyDir: {}
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi
