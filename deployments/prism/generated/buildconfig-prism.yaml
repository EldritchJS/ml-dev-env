---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: prism-image-build
  labels:
    app: prism
    build-type: container-image
spec:
  # Build from Dockerfile in Git repository
  source:
    type: Git
    git:
      uri: https://github.com/EldritchJS/ml-dev-env.git
      ref: main
    contextDir: deployments/prism

  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.nemo-base
      # Using NeMo base container - much faster build

  output:
    to:
      kind: ImageStreamTag
      name: prism:test

  # Resource limits for build pod
  resources:
    limits:
      memory: 8Gi
      cpu: 4
    requests:
      memory: 4Gi
      cpu: 2

  # Trigger builds manually (not on every commit)
  triggers: []

---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: prism
  labels:
    app: prism
spec:
  lookupPolicy:
    local: true
  tags:
  - name: test
    annotations:
      description: "Prism test image - BEACON continued pre-training environment"
    from:
      kind: DockerImage
      name: image-registry.openshift-image-registry.svc:5000/nccl-test/prism:test
