apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pytorch-benchmark-u25-u32
  namespace: nccl-test
spec:
  serviceName: pytorch-benchmark-u25-u32-svc
  podManagementPolicy: Parallel
  replicas: 2
  selector:
    matchLabels:
      app: pytorch-benchmark-u25-u32
  template:
    metadata:
      labels:
        app: pytorch-benchmark-u25-u32
      annotations:
        k8s.v1.cni.cncf.io/networks: default/eno5np0-network,default/eno6np0-network,default/eno7np0-network,default/eno8np0-network
    spec:
      serviceAccountName: nccl-sa
      hostIPC: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - pytorch-benchmark-u25-u36
            topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - moc-r4pcc04u25-nairr
                - moc-r4pcc02u32
      containers:
      - name: pytorch-benchmark
        image: nvcr.io/nvidia/pytorch:25.01-py3
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -x
          echo "Starting PyTorch AllReduce Benchmark on pod ${POD_NAME}"

          # Extract rank from pod name
          export NODE_RANK=${POD_NAME##*-}
          export NNODES=2
          export NPROC_PER_NODE=4
          export MASTER_PORT=29501

          # Discover master pod IP
          if [ "${POD_NAME}" = "pytorch-benchmark-u25-u32-0" ]; then
            export MASTER_ADDR=${POD_IP}
            echo "I am the master node (node_rank 0)"
          else
            echo "Discovering master pod IP..."
            for i in {1..60}; do
              MASTER_IP=$(getent hosts pytorch-benchmark-u25-u32-0.pytorch-benchmark-u25-u32-svc.nccl-test.svc.cluster.local | awk '{print $1}')
              if [ -n "$MASTER_IP" ]; then
                export MASTER_ADDR=$MASTER_IP
                echo "Master node IP: ${MASTER_ADDR}"
                break
              fi
              echo "Waiting for master pod... (attempt $i/60)"
              sleep 2
            done

            if [ -z "$MASTER_ADDR" ]; then
              echo "Failed to discover master node IP"
              exit 1
            fi
          fi

          echo "NODE_RANK=${NODE_RANK}, NNODES=${NNODES}, NPROC_PER_NODE=${NPROC_PER_NODE}"
          echo "MASTER_ADDR=${MASTER_ADDR}, MASTER_PORT=${MASTER_PORT}"
          echo "Total GPUs: $((NNODES * NPROC_PER_NODE))"

          # Display configuration
          echo "=== GPU Information ==="
          nvidia-smi --query-gpu=index,name,memory.total --format=csv

          echo "=== RDMA Devices ==="
          ls -la /dev/infiniband/ 2>/dev/null || echo "No InfiniBand devices"
          ls -la /sys/class/infiniband/ 2>/dev/null || echo "No InfiniBand sysfs"

          echo "=== SR-IOV Network Interfaces ==="
          for iface in net1 net2 net3 net4; do
            if [ -e /sys/class/net/$iface ]; then
              echo "$iface: $(cat /sys/class/net/$iface/address) MTU=$(cat /sys/class/net/$iface/mtu)"
            fi
          done

          echo "=== NCCL Environment ==="
          env | grep NCCL | sort

          # Wait for all pods to be ready
          echo "Waiting for all pods to be ready..."
          sleep 10

          echo "=== Starting PyTorch Distributed Benchmark ==="

          # Run the benchmark with torchrun
          torchrun \
            --nnodes=${NNODES} \
            --nproc_per_node=${NPROC_PER_NODE} \
            --node_rank=${NODE_RANK} \
            --master_addr=${MASTER_ADDR} \
            --master_port=${MASTER_PORT} \
            --rdzv_backend=c10d \
            --rdzv_endpoint=${MASTER_ADDR}:${MASTER_PORT} \
            /benchmark/allreduce-loop.py --multiplier 1

          BENCHMARK_EXIT_CODE=$?

          echo "=== Benchmark completed with exit code: ${BENCHMARK_EXIT_CODE} ==="

          if [ ${BENCHMARK_EXIT_CODE} -eq 0 ]; then
            echo "SUCCESS: Benchmark completed on ${POD_NAME}"
          else
            echo "ERROR: Benchmark failed on ${POD_NAME}"
          fi

          # Keep container running for log inspection
          echo "Container will remain running. Use 'oc logs' to view results."
          sleep infinity
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        # NCCL Configuration for SR-IOV RDMA
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_DEBUG_SUBSYS
          value: "INIT,NET"

        # Network configuration
        - name: NCCL_SOCKET_IFNAME
          value: "net1,net2,net3,net4"

        # InfiniBand/RDMA configuration
        # DO NOT set NCCL_IB_DISABLE or NCCL_IB_HCA - let NCCL auto-detect from NCCL_SOCKET_IFNAME
        - name: NCCL_DMABUF_ENABLE
          value: "1"
        - name: NCCL_IB_GID_INDEX
          value: "3"
        - name: NCCL_IB_TC
          value: "106"
        - name: NCCL_IB_TIMEOUT
          value: "23"
        - name: NCCL_IB_RETRY_CNT
          value: "7"
        - name: NCCL_IB_SL
          value: "0"
        - name: NCCL_IB_AR_THRESHOLD
          value: "8192"
        - name: NCCL_IB_PCI_RELAXED_ORDERING
          value: "1"
        - name: NCCL_NET_GDR_LEVEL
          value: "5"
        - name: NCCL_NET_GDR_READ
          value: "1"
        - name: NCCL_NET_SHARED_BUFFERS
          value: "1"
        - name: NCCL_NET_OVERHEAD
          value: "0"

        # Algorithm and protocol
        - name: NCCL_ALGO
          value: "Ring"
        - name: NCCL_PROTO
          value: "Simple"

        # Performance tuning
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        - name: NCCL_MAX_NCHANNELS
          value: "16"
        - name: NCCL_BUFFSIZE
          value: "8388608"
        - name: NCCL_NTHREADS
          value: "512"
        - name: NCCL_LL_THRESHOLD
          value: "0"
        - name: NCCL_TREE_THRESHOLD
          value: "0"
        - name: NCCL_SOCKET_FAMILY
          value: "4"
        - name: NCCL_NSOCKS_PERTHREAD
          value: "8"
        - name: NCCL_CROSS_NIC
          value: "2"
        - name: NCCL_NVLS_ENABLE
          value: "0"
        - name: NCCL_IGNORE_CPU_AFFINITY
          value: "1"

        # GPU configuration
        - name: CUDA_VISIBLE_DEVICES
          value: "0,1,2,3"

        resources:
          requests:
            nvidia.com/gpu: 4
            openshift.io/eno5np0rdma: 1
            openshift.io/eno6np0rdma: 1
            openshift.io/eno7np0rdma: 1
            openshift.io/eno8np0rdma: 1
            cpu: "32"
            memory: "64Gi"
          limits:
            nvidia.com/gpu: 4
            openshift.io/eno5np0rdma: 1
            openshift.io/eno6np0rdma: 1
            openshift.io/eno7np0rdma: 1
            openshift.io/eno8np0rdma: 1
            cpu: "64"
            memory: "128Gi"
        volumeMounts:
        - name: benchmark-script
          mountPath: /benchmark
        - name: dshm
          mountPath: /dev/shm
        securityContext:
          privileged: false
          capabilities:
            add:
            - IPC_LOCK
            - SYS_ADMIN
      volumes:
      - name: benchmark-script
        configMap:
          name: pytorch-benchmark
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pytorch-benchmark-u25-u32-svc
  namespace: nccl-test
spec:
  clusterIP: None
  selector:
    app: pytorch-benchmark-u25-u36
  ports:
  - port: 29501
    name: master
