apiVersion: v1
kind: Service
metadata:
  name: ibm-benchmark-headless
  namespace: b-efficient-memory-offloading-765cab
  labels:
    app: ibm-benchmark-u17-u18
spec:
  clusterIP: None  # Headless service
  selector:
    app: ibm-benchmark-u17-u18
  ports:
  - port: 29500
    name: master
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ibm-benchmark
  namespace: b-efficient-memory-offloading-765cab
  labels:
    app: ibm-benchmark-u17-u18
spec:
  serviceName: ibm-benchmark-headless
  replicas: 2  # 2 nodes (u17 and u18)
  podManagementPolicy: Parallel

  selector:
    matchLabels:
      app: ibm-benchmark-u17-u18

  template:
    metadata:
      labels:
        app: ibm-benchmark-u17-u18

      annotations:
        k8s.v1.cni.cncf.io/networks: b-efficient-memory-offloading-765cab/eno5np0-network, b-efficient-memory-offloading-765cab/eno6np0-network, b-efficient-memory-offloading-765cab/eno7np0-network, b-efficient-memory-offloading-765cab/eno8np0-network

    spec:
      # Use SR-IOV for RDMA networking
      restartPolicy: Always

      # Spread pods across different nodes
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - moc-r4pcc04u17
                - moc-r4pcc04u18
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - ibm-benchmark-u17-u18
            topologyKey: kubernetes.io/hostname

      nodeSelector:
        nvidia.com/gpu.present: "true"

      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

      # Service account with nccl-rdma-scc for unlimited memlock
      serviceAccountName: h-kim-sa

      initContainers:
      - name: autodetect-nccl
        image: quay.io/jschless/ml-dev-env:h-kim

        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "=========================================="
          echo "Comprehensive NCCL Auto-Detection"
          echo "=========================================="
          echo ""
          echo "Note: Init containers cannot access GPUs/IB devices directly"
          echo "NVLink and IB HCA detection are conservative defaults"
          echo "Override via env vars if needed (see AUTODETECT-OVERRIDES.md)"
          echo ""

          # Run the comprehensive autodetect script
          /usr/local/bin/autodetect-nccl.sh

          echo ""
          echo "=========================================="
          echo "Auto-Detected Configuration:"
          echo "=========================================="
          cat /shared/nccl-env.sh
          echo "=========================================="
        volumeMounts:
        - name: nccl-env
          mountPath: /shared
        securityContext:
          capabilities:
            add:
              - IPC_LOCK
              - SYS_RESOURCE

      containers:
      - name: ibm-benchmark
        image: quay.io/jschless/ml-dev-env:h-kim
        imagePullPolicy: Always

        # Security context for RDMA - SYS_RESOURCE allows setting unlimited memlock
        securityContext:
          privileged: true
          capabilities:
            add:
              - IPC_LOCK
              - SYS_RESOURCE

        resources:
          requests:
            nvidia.com/gpu: 4
            memory: 1200Gi
            cpu: 32
            openshift.io/eno5np0rdma: 1
            openshift.io/eno6np0rdma: 1
            openshift.io/eno7np0rdma: 1
            openshift.io/eno8np0rdma: 1
          limits:
            nvidia.com/gpu: 4
            memory: 1200Gi
            cpu: 64
            openshift.io/eno5np0rdma: 1
            openshift.io/eno6np0rdma: 1
            openshift.io/eno7np0rdma: 1
            openshift.io/eno8np0rdma: 1

        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"

        # NCCL configuration for physical RDMA interfaces (SR-IOV mode)
        - name: NCCL_DEBUG
          value: "INFO"
        # SR-IOV networking - use RDMA interfaces for data plane
        - name: NCCL_SOCKET_IFNAME
          value: "net1,net2,net3,net4"
        # Enable InfiniBand/RoCE
        - name: NCCL_IB_DISABLE
          value: "0"
        # SR-IOV VF RDMA devices - use regex to auto-detect
        - name: NCCL_IB_HCA
          value: "^mlx5_"
        # GID index for RoCE
        - name: NCCL_IB_GID_INDEX
          value: "3"
        # Enable GPUDirect RDMA
        - name: NCCL_NET_GDR_LEVEL
          value: "5"
        # Use Ring algorithm
        - name: NCCL_ALGO
          value: "Ring"
        # P2P level
        - name: NCCL_P2P_LEVEL
          value: "SYS"

        # Pod identity
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

        # Distributed training settings
        - name: MASTER_ADDR
          value: "ibm-benchmark-0.ibm-benchmark-headless.b-efficient-memory-offloading-765cab.svc.cluster.local"
        - name: MASTER_PORT
          value: "29500"

        volumeMounts:
        - name: nccl-env
          mountPath: /shared
        - name: workspace
          mountPath: /workspace
        - name: dshm
          mountPath: /dev/shm
        - name: infiniband
          mountPath: /dev/infiniband
        - name: sys-class-infiniband
          mountPath: /sys/class/infiniband
          readOnly: true

        ports:
        - containerPort: 29500
          name: master
          protocol: TCP

        command:
        - /bin/bash
        - -c
        - |
          set -e

          # Set unlimited memlock for RDMA (works with SYS_RESOURCE capability)
          ulimit -l unlimited
          echo "Memlock limit: $(ulimit -l)"
          echo ""

          # Source comprehensive auto-detected configuration
          if [ -f /shared/nccl-env.sh ]; then
            echo "=========================================="
            echo "Loading Auto-Detected Configuration"
            echo "=========================================="
            source /shared/nccl-env.sh
            echo ""
          else
            echo "ERROR: /shared/nccl-env.sh not found!"
            echo "Autodetect init container may have failed"
            exit 1
          fi

          # Calculate node rank from pod ordinal
          POD_ORDINAL=${HOSTNAME##*-}
          export NODE_RANK=$POD_ORDINAL

          echo "=========================================="
          echo "IBM All-Reduce Benchmark - U17/U18"
          echo "=========================================="
          echo "Pod: $POD_NAME"
          echo "Node Rank: $NODE_RANK"
          echo ""
          echo "AUTO-DETECTED VALUES:"
          echo "  GPUs per node: $GPUS_PER_NODE (detected!)"
          echo "  OMP threads: $OMP_NUM_THREADS (detected!)"
          echo "  Transport: $DETECTED_TRANSPORT (detected!)"
          echo ""
          echo "Master: $MASTER_ADDR:$MASTER_PORT"
          echo "=========================================="
          echo ""

          # Show comprehensive NCCL configuration
          echo "NCCL Configuration (auto-detected):"
          env | grep NCCL_ | sort
          echo ""

          # Show GPU topology
          echo "GPU Topology:"
          nvidia-smi topo -m 2>/dev/null || echo "  (topology info not available)"
          echo ""

          # Show detected GPUs
          echo "Detected GPUs:"
          nvidia-smi --query-gpu=index,name,memory.total --format=csv,noheader
          echo ""

          # Wait for all pods to be ready
          echo "Waiting for all pods to be ready..."
          sleep 10

          # Clone IBM research all-reduce benchmark if not already present
          if [ ! -d /workspace/all_reduce_perf ]; then
            echo "Cloning IBM all-reduce benchmark..."
            cd /workspace
            GIT_TERMINAL_PROMPT=0 git clone --depth 1 https://github.com/IBM/all_reduce_perf.git
            cd all_reduce_perf
          else
            echo "IBM all-reduce benchmark already cloned"
            cd /workspace/all_reduce_perf
          fi

          echo ""
          echo "=========================================="
          echo "Running IBM All-Reduce Benchmark"
          echo "=========================================="
          echo "Nodes: 2 (u17, u18)"
          echo "GPUs per node: $GPUS_PER_NODE"
          echo "Total GPUs: $((2 * GPUS_PER_NODE))"
          echo "=========================================="
          echo ""

          # Run the benchmark
          mpirun -np $((2 * GPUS_PER_NODE)) \
            -H ibm-benchmark-0:$GPUS_PER_NODE,ibm-benchmark-1:$GPUS_PER_NODE \
            -bind-to none -map-by slot \
            -x NCCL_DEBUG=INFO \
            -x NCCL_SOCKET_IFNAME=net1,net2,net3,net4 \
            -x NCCL_IB_DISABLE=0 \
            -x NCCL_IB_HCA=^mlx5_ \
            -x NCCL_IB_GID_INDEX=3 \
            -x NCCL_NET_GDR_LEVEL=5 \
            -x NCCL_ALGO=Ring \
            -x NCCL_P2P_LEVEL=SYS \
            -mca pml ob1 -mca btl tcp,self -mca btl_tcp_if_include net1,net2,net3,net4 \
            python all_reduce_perf.py --dtype float16 --maxbytes 8G

          echo ""
          echo "=========================================="
          echo "Benchmark Complete"
          echo "=========================================="
          echo ""
          echo "Keeping pod alive for log inspection..."
          sleep infinity

      volumes:
      - name: nccl-env
        emptyDir: {}
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi
      - name: infiniband
        hostPath:
          path: /dev/infiniband
          type: Directory
      - name: sys-class-infiniband
        hostPath:
          path: /sys/class/infiniband
          type: Directory

  # Each pod gets its own workspace PVC
  volumeClaimTemplates:
  - metadata:
      name: workspace
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Gi
      storageClassName: ocs-external-storagecluster-ceph-rbd
